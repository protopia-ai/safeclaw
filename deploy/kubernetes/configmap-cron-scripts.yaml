---
# Cron registration scripts.
#
# These scripts are run ONCE by job-register-crons.yaml to register recurring schedules
# with the running openclaw gateway. The gateway then executes the tasks on schedule
# internally, these are not K8s CronJobs.
#
# All jobs are registered with --disabled so they do NOT run automatically after
# registration. Must be explicitly enabled:
#
#   openclaw cron list  # find the job id
#   openclaw cron enable <id>  # start the schedule
#
# To enable from inside the cluster:
#   kubectl exec -n protopia-safeclaw safeclaw-0 -c openclaw -- openclaw cron list
#   kubectl exec -n protopia-safeclaw safeclaw-0 -c openclaw -- openclaw cron enable <id>
#
# ${SLACK_CHANNEL_ID} is expanded at runtime from the SLACK_CHANNEL_ID env var.
# Set it in the job-register-crons.yaml env section before applying.
apiVersion: v1
kind: ConfigMap
metadata:
  name: safeclaw-cron-scripts
  namespace: protopia-safeclaw
data:
  portfolio_monitor.sh: |
    #!/bin/sh
    openclaw cron add \
      --name "Investment Portfolio Monitor" \
      --agent safeclaw \
      --every 10m \
      --disabled \
      --session isolated \
      --model "vllm/Qwen/Qwen3-32B" \
      --announce \
      --channel slack \
      --to "${SLACK_CHANNEL_ID}" \
      --message "Complete the task in \`investment-portfolio/TASK.md\`. Your Slack reply must start with ':stainedglass: This content is protected by Protopia Stained Glass :stainedglass: \n\n'."
  email_monitor.sh: |
    #!/bin/sh
    openclaw cron add \
      --name "Email Monitor" \
      --agent safeclaw \
      --every 24h \
      --disabled \
      --session isolated \
      --model "vllm/Qwen/Qwen3-32B" \
      --announce \
      --channel slack \
      --to "${SLACK_CHANNEL_ID}" \
      --message "Complete the task in \`email-monitor/TASK.md\`. After completing the task, your task output Slack message must start with ':stainedglass: This content is protected by Protopia Stained Glass :stainedglass: \n\n'."
  pii_scanner.sh: |
    #!/bin/sh
    openclaw cron add \
      --name "Data Guardian PII Scanner" \
      --agent safeclaw \
      --every 15m \
      --disabled \
      --session isolated \
      --model "vllm/Qwen/Qwen3-32B" \
      --announce \
      --channel slack \
      --to "${SLACK_CHANNEL_ID}" \
      --message "Complete the task in \`pii-scanner/TASK.md\`. After completing the task, your task output Slack message must start with ':stainedglass: This content is protected by Protopia Stained Glass :stainedglass: \n\n'."
  github_monitor.sh: |
    #!/bin/sh
    openclaw cron add \
      --name "vLLM Top PRs" \
      --agent safeclaw \
      --every 10m \
      --disabled \
      --session isolated \
      --model "vllm/Qwen/Qwen3-32B" \
      --announce \
      --channel slack \
      --to "${SLACK_CHANNEL_ID}" \
      --message "Search the GitHub API for the top 10 most active open PRs in the vllm-project/vllm repository. Format as a Slack table with columns: PR# | Title (truncated to 60 chars) | Link. Include a header line with the fetch timestamp in UTC. After completing the task, your task output Slack message must start with ':stainedglass: This content is protected by Protopia Stained Glass :stainedglass: \n\n'."
  register_all.sh: |-
    #!/bin/sh
    set -e
    sh /etc/cron-scripts/portfolio_monitor.sh
    sh /etc/cron-scripts/email_monitor.sh
    sh /etc/cron-scripts/pii_scanner.sh
    sh /etc/cron-scripts/github_monitor.sh
    echo "All cron jobs registered."
