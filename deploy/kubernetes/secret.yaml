---
# WARNING: This file is a TEMPLATE. Replace all REPLACE_ME values 
# before applying.
# NEVER commit this file with real secret values to version control.
#
# Preferred alternative: create the secret directly without writing values to disk:
#
#   kubectl create secret generic safeclaw-secrets -n protopia-safeclaw \
#     --from-literal=SGT_BASE_URL='...' \
#     --from-literal=SGT_API_KEY='...' \
#     --from-literal=GOG_KEYRING_PASSWORD='...' \
#     --from-literal=SLACK_BOT_TOKEN='xoxb-...' \
#     --from-literal=SLACK_APP_TOKEN='xapp-...' \
#     --from-literal=BRAVE_API_KEY='...'
apiVersion: v1
kind: Secret
metadata:
  name: safeclaw-secrets
  namespace: protopia-safeclaw
type: Opaque
stringData:
  # Required for all examples — SGT endpoint that protects all model calls.
  # See: https://docs.openclaw.ai/gateway/authentication
  SGT_BASE_URL: REPLACE_ME  # URL of your SGT instance.
  SGT_API_KEY: REPLACE_ME  # API key issued by Protopia AI for your SGT instance.

  # Required for Example 3 (Email Monitor): Google OAuth keyring password used by gog skill.
  GOG_KEYRING_PASSWORD: REPLACE_ME

  # Required for Examples 2, 3, 4 (Portfolio Monitor, Email Monitor, PII Scanner).
  # The Slack bot delivers cron-job results to your Slack workspace.
  SLACK_BOT_TOKEN: REPLACE_ME  # xoxb-...
  SLACK_APP_TOKEN: REPLACE_ME  # xapp-...

  # Required for Example 2 (Portfolio Monitor): Brave Search API for live stock data.
  BRAVE_API_KEY: REPLACE_ME
